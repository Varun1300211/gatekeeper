spring:
  application:
    name: GateKeeper
  profiles:
    default: h2
  cache:
    cache-names: gatekeeperEvaluations
  data:
    redis:
      repositories:
        enabled: false
  jpa:
    open-in-view: false

server:
  port: 8080

gatekeeper:
  sdk:
    base-url: http://localhost:8080
    local-cache-ttl-seconds: 30
    flag-key: beta-checkout
    user-id: sdk-user
    environment: prod
    poll-interval-seconds: 15
