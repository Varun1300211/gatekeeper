spring:
  application:
    name: GateKeeper
  profiles:
    default: h2
  cache:
    cache-names: gatekeeperEvaluations
  data:
    redis:
      repositories:
        enabled: false
  jpa:
    open-in-view: false

server:
  port: ${PORT:8080}

gatekeeper:
  cors:
    allowed-origin-patterns:
      - http://localhost:5173
      - http://127.0.0.1:5173
      - https://*.netlify.app
      - https://*.vercel.app
  rate-limit:
    evaluate:
      enabled: true
      requests-per-minute: 60
  sdk:
    base-url: http://localhost:8080
    local-cache-ttl-seconds: 30
    flag-key: beta-checkout
    user-id: sdk-user
    environment: prod
    poll-interval-seconds: 15
